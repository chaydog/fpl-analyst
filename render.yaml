services:
  - type: web
    name: fpl-analyst
    runtime: python
    buildCommand: pip install -r requirements.txt && python main.py pull && python main.py train
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
